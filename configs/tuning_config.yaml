# Hyperparameter Tuning Configuration
# This config defines search spaces for Optuna optimization

# Search spaces (min, max, log_scale)
search_space:
  # GRL (Gradient Reversal Layer)
  grl:
    weight: [0.01, 0.2, true]       # Loss weight
    lr: [0.00001, 0.001, true]      # Learning rate
    max_alpha: [0.1, 0.5, false]    # Max GRL alpha
  
  # Distillation (Teacher → Student)
  distillation:
    conf_thres_min: [0.3, 0.6, false]   # Min confidence
    conf_thres_max: [0.6, 0.9, false]   # Max confidence
    lambda_weight: [0.05, 0.5, true]    # Loss weight
  
  # EMA (Exponential Moving Average)
  teacher:
    alpha: [0.99, 0.9999, true]         # EMA decay

# Tuning settings
tuning:
  n_trials: 50                    # Number of trials
  epochs_per_trial: 20            # Short epochs for fast iteration
  metric: "mAP@50"                # Optimization target
  direction: "maximize"
  
  # Early stopping
  pruning:
    enabled: true
    n_startup_trials: 5           # Trials before pruning starts
    n_warmup_steps: 5             # Steps before pruning in each trial

# Base config to modify
base_config: "configs/train_config.yaml"

# Storage
storage:
  type: "sqlite"                  # sqlite, postgresql, mysql
  path: "optuna_studies"          # Directory for SQLite DBs
